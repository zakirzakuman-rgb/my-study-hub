<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakir's Matric Prep Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="leaderboard-container">
    </div>
    <div id="login-page">
        <div class="login-container">
            <h2> Study Hub</h2>
            <p>Please log in to start your practice</p>
            <input type="text" id="username" placeholder="Enter Your Name">
            <input type="password" id="password" placeholder="Enter Password (zakir123)">
     <div class="subject-container">
    
    <div class="subject-card">
        <div class="icon">Math</div>
        <h3>Mathematics</h3>
        <p>Algebra & Geometry</p>
        <button onclick="startQuiz('math')">Start Practice</button>
    </div>

    <div class="subject-card">
        <div class="icon">Geo</div>
        <h3>Geography</h3>
        <p>Map & Population</p>
        <button onclick="startQuiz('geography')">Start Practice</button>
    </div>

    <div class="subject-card">
        <div class="icon">Hist</div>
        <h3>History</h3>
        <p>Ethiopian History</p>
        <button onclick="startQuiz('history')">Start Practice</button>
    </div>

    <div class="subject-card">
        <div class="icon">IQ</div>
        <h3>Aptitude</h3>
        <p>Logic & Numbers</p>
        <button onclick="startQuiz('aptitude')">Start Practice</button>
    </div>

</div>
    <script src="script.js"></script>
</body>
</html>
