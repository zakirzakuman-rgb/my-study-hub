<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakir's Matric Prep Hub</title>
    <meta name="description" content=" Matric Prep Hub - Practice Geography, History, and Aptitude questions for Ethiopian Grade 12 students.">
<meta name="keywords" content="Matric, Ethiopia, Grade 12, Geography, History, Aptitude, Kombolcha, Zakir">
<meta name="author" content="allr">
    <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="MwjMR9FcEPS2BiS-YdYJab5YHVa0MKoBzRsRplKT9M0" />
</head>
<body>
    <div id="login-overlay">
    <div class="login-box">
        <h2>Study Hub</h2>
        <p>WELCOME TO THIS SITE!</p>
        <input type="text" id="userNameInput" placeholder="Enter your name..." required>
        <select id="streamChoice">
            <option value="">-- Select Stream --</option>
            <option value="natural">Natural Science</option>
            <option value="social">Social Science</option>
        </select>
        <button class="start-btn" onclick="startApp()">Start</button>
    </div>
</div>

<div id="main-content" style="display:none;">
    <h1 id="main-title">s Study Hub</h1>
    
    <div class="tabs">
        <button id="social-tab" class="tab-btn" onclick="switchStream('social')">Social Science</button>
        <button id="natural-tab" class="tab-btn" onclick="switchStream('natural')">Natural Science</button>
    </div>

    <div id="social-subjects" class="subject-container">
        <div class="subject-card">
            <div class="icon">Geo</div>
            <h3>Geography</h3>
            <p>Map & Population</p>
            <button class="quiz-btn" onclick="startQuiz('Geography')">Start Quiz</button>
        </div>
        <div class="subject-card">
            <div class="icon">Hist</div>
            <h3>History</h3>
            <p>World & Ethiopia</p>
            <button class="quiz-btn" onclick="startQuiz('History')">Start Quiz</button>
        </div>
        </div>

    <div id="natural-subjects" class="subject-container" style="display:none;">
        <div class="subject-card">
            <div class="icon">Bio</div>
            <h3>Biology</h3>
            <p>Genetics & Ecology</p>
            <button class="quiz-btn" onclick="startQuiz('Biology')">Start Quiz</button>
        </div>
        <div class="subject-card">
            <div class="icon">Phy</div>
            <h3>Physics</h3>
            <p>Mechanics & Optics</p>
            <button class="quiz-btn" onclick="startQuiz('Physics')">Start Quiz</button>
        </div>
        </div>
</div>

    <script src="script.js"></script>
</body>
</html>
