<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakir's Matric Prep Hub</title>
    <meta name="description" content="Zakir's Matric Prep Hub - Practice Geography, History, and Aptitude questions for Ethiopian Grade 12 students.">
<meta name="keywords" content="Matric, Ethiopia, Grade 12, Geography, History, Aptitude, Kombolcha, Zakir">
<meta name="author" content="Zakir">
    <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="MwjMR9FcEPS2BiS-YdYJab5YHVa0MKoBzRsRplKT9M0" />
</head>
<body>
    <div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0066cc; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s;">
    <div style="text-align: center; color: white; font-family: sans-serif;">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">Zakir's Study Hub</h1>
        <p style="font-size: 1.2rem; margin-bottom: 25px;">እንኳን ደህና መጡ! ስምዎን ያስገቡ።</p>
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <input type="text" id="userNameInput" placeholder="ስምዎን እዚህ ይጻፉ..." 
                   style="padding: 12px 20px; border-radius: 25px; border: none; width: 250px; outline: none; font-size: 16px; color: #333;">
            
            <button onclick="let name = document.getElementById('userNameInput').value; 
                             if(name.trim() !== ''){ 
                                localStorage.setItem('currentUser', name); 
                                document.getElementById('login-overlay').style.display='none'; 
                             } else { alert('እባክዎን ስምዎን ያስገቡ!'); }" 
                    style="padding: 12px 30px; border-radius: 25px; cursor: pointer; background: #5dade2; color: white; border: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                Start
            </button>
        </div>
    </div>
</div>

    <div id="main-container">
        <h1>Zakir's Study Hub</h1>
        
        <div id="subject-selection" class="subject-container">
            <div class="subject-card">
                <div class="icon">Geo</div>
                <h3>Geography</h3>
                <p>Map & Population</p>
                <button onclick="startQuiz('Geography')">Start Quiz</button>
            </div>

            <div class="subject-card">
                <div class="icon">Hist</div>
                <h3>History</h3>
                <p>World & Ethiopia</p>
                <button onclick="startQuiz('History')">Start Quiz</button>
            </div>

            <div class="subject-card">
                <div class="icon">IQ</div>
                <h3>Aptitude</h3>
                <p>Logic & Math</p>
                <button onclick="startQuiz('Aptitude')">Start Quiz</button>
            </div>
        
            <div class="subject-card">
                <div class="icon">Eng</div>
                <h3>English</h3>
                <p>Grammar</p>
                <button onclick="startQuiz('English')">Start Quiz</button>
            </div>

            <div class="subject-card">
                <div class="icon">Math</div>
                <h3>Mathematics</h3>
                <p>Social Science</p>
                <button onclick="startQuiz('Mathematics')">Start Quiz</button>
            </div>

            <div class="subject-card">
                <div class="icon">Eco</div>
                <h3>Economics</h3>
                <p>Micro & Macro</p>
                <button onclick="startQuiz('Economics')">Start Quiz</button>
            </div>
        </div>

       <div id="quiz-box" style="display: none;">
    <div id="timer">Time Left: 30s</div>
    <h2 id="question-text">Question goes here</h2>
    <div id="btns-container"></div>
    
    <button onclick="cancelQuiz()" style="background-color: red; color: white; margin-top: 10px; cursor: pointer;">Cancel Quiz</button>
</div>

    <script src="script.js"></script>
</body>
</html>
